# Game Adapter Contract
# How game studios register games on the PwnTensor subnet.

adapter_contract:
  description: >
    Each game on the subnet needs an adapter that validators can run
    to execute headless episodes. The adapter handles sim initialization,
    state extraction, action application, and episode termination.

  interface:
    init_episode:
      input: "episode_seed (int)"
      output: "initial game state (dict)"
      notes: "Deterministic — same seed always produces same initial state"

    get_state:
      input: "none (reads internal sim state)"
      output: "state dict conforming to game's context schema"

    apply_action:
      input: "action (str), action_args (dict)"
      output: "updated state dict"
      notes: "Steps the sim one tick with the miner's chosen action"

    is_episode_done:
      output: "bool"

    get_episode_log:
      output: "dict with all metrics needed by the game's scoring function"

  adapter_types:
    builtin:
      description: "Python module in the validator's sim/ directory"
      example: "sim.pactensor, sim.mortal_kombat, sim.halo"
      when: "Demo games, games with simple sims"

    docker:
      description: "Docker image that exposes the adapter interface over HTTP"
      example: "ghcr.io/studio/their-game-adapter:latest"
      when: "Complex game engines, proprietary sims"
      notes: >
        Validator pulls and runs the Docker image locally. The game studio
        maintains the image. This is the production path for onboarding
        arbitrary games.

    api:
      description: "External API endpoint the validator calls"
      example: "https://api.gamestudio.com/sim/v1"
      when: "Studio wants to run their own sim infrastructure"
      notes: >
        Introduces validator variance risk — network latency affects scores.
        Prefer Docker adapters for determinism.

  per_game_state_schemas:
    pactensor:
      pacman_pos: "[x, y]"
      ghost_positions: "[[x,y], ...]"
      ghost_modes: "[chase|scatter|frightened|eaten]"
      ghost_boost_multiplier: "float"
      pellets_remaining: "int"
      power_pellet_active: "bool"
      maze_layout: "run-length encoded grid"
      tick: "int"

    meleelight:
      p1_pos: "{x, y} float position"
      p2_pos: "{x, y} float position"
      p1_percent: "int (damage accumulated)"
      p2_percent: "int (damage accumulated)"
      p1_stocks: "int (lives remaining)"
      p2_stocks: "int (lives remaining)"
      p1_action_state: "string (idle, dash, jump, attack, etc)"
      p2_action_state: "string"
      p1_facing: "int (-1 or 1)"
      p2_facing: "int (-1 or 1)"
      stage_id: "string"
      frame: "int"

    kaz:
      agent_id: "string (knight_0, knight_1, archer_0, archer_1)"
      agent_pos: "{x, y} float position"
      agent_health: "int"
      agent_type: "string (knight|archer)"
      nearby_zombies: "[{pos, health, distance}]"
      nearby_allies: "[{id, pos, health, type}]"
      arrows_in_flight: "[{pos, velocity}]"
      wave: "int"
      zombies_remaining: "int"
      tick: "int"

  scoring_dimensions:
    universal:
      - latency: "Response under timeout gets full credit; degrades linearly after"
    per_game:
      - behavioral_correctness: "Did the NPC achieve its objective?"
      - naturalness: "Human rater panel or LLM judge for believability"
      - consistency: "Coherent behavior across a 30-tick episode"
      - adversarial_robustness: "Does it break on weird state?"
