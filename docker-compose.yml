# PwnTensor Subnet Docker Compose
#
# For Validators: Use this file to run the validator + frontend locally
#
# Usage:
#   1. Copy env.example to .env and update values
#   2. Run: docker-compose up -d
#   3. View logs: docker-compose logs -f validator
#   4. Play games: http://localhost:8080 (PacTensor), /melee/ (Melee Light), /kaz/ (KAZ)
#
# Watchtower auto-updates when new images are pushed to GHCR

services:
  validator:
    # For production: use GHCR image
    # image: ghcr.io/your-org/pwntensor:latest

    # For development: build locally
    build: .

    container_name: pwntensor-validator
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - NETWORK=${NETWORK:-finney}
      - NETUID=${NETUID:-1}
      - WALLET_NAME=${WALLET_NAME:-default}
      - HOTKEY_NAME=${HOTKEY_NAME:-default}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
      - validator-data:/app/data

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

    healthcheck:
      test: ["CMD", "python", "-c", "import bittensor; print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Frontend — nginx serving all three game UIs
  frontend:
    image: nginx:alpine
    container_name: pwntensor-frontend
    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-8080}:8080"

    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/base/nginx-configmap.yaml:/tmp/nginx-src:ro

    # Inline nginx config since configmap is k8s-only
    command: >
      sh -c "echo 'server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        location / { try_files $$uri $$uri/ /index.html; }
        location /melee/ { alias /usr/share/nginx/html/meleelight/; try_files $$uri $$uri/ /meleelight/index.html; }
        location /kaz/ { alias /usr/share/nginx/html/kaz/; try_files $$uri $$uri/ /kaz/index.html; }
        location /healthz { return 200 ok; add_header Content-Type text/plain; }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Watchtower — auto-updates containers when new images are pushed
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped

    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_ROLLING_RESTART=true

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


volumes:
  validator-data:
