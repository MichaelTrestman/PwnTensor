apiVersion: v1
kind: Service
metadata:
  name: pwntensor-frontend
  namespace: pwntensor
  labels:
    app: pwntensor
    component: frontend
spec:
  selector:
    app: pwntensor
    component: validator
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
